services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: brain_os
      POSTGRES_USER: brain_os
      POSTGRES_PASSWORD: brain_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: brain_os
      RABBITMQ_DEFAULT_PASS: brain_os
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
