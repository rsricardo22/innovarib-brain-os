services:
  postgres:
    image: postgres:16-alpine
    container_name: innovarib-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-innovarib}
      POSTGRES_USER: ${POSTGRES_USER:-innovarib}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innovarib_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: innovarib-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: innovarib-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-innovarib}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-innovarib_dev_password}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: innovarib-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: eclipse-temurin:17-jre-alpine
    container_name: innovarib-backend
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "echo 'Backend Spring Boot base pendiente de implementar. Manteniendo contenedor activo para la composición inicial.' && tail -f /dev/null"]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-innovarib}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-innovarib}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-innovarib_dev_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-innovarib}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-innovarib_dev_password}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-innovarib-brain-os}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_password}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-local-development-only}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: innovarib-frontend
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "echo 'Frontend Angular base pendiente de implementar. Manteniendo contenedor activo para la composición inicial.' && tail -f /dev/null"]
    environment:
      API_BASE_URL: http://localhost:${BACKEND_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: innovarib-nginx
    restart: unless-stopped
    profiles: ["proxy"]
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
