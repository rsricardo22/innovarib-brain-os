services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: brainos
      POSTGRES_USER: brainos
      POSTGRES_PASSWORD: brainos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainos -d brainos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./apps/backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/brainos
      SPRING_DATASOURCE_USERNAME: brainos
      SPRING_DATASOURCE_PASSWORD: brainos
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
      BRAINOS_SECURITY_DEV_MODE: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./apps/frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
